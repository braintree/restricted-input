name: "CI"

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: "Formatter and Unit Tests on Ubuntu"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npx eslint --ext .js,.ts src test
      - run: npm test
