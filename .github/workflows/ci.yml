name: "Unit Tests"

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - "*"

jobs:
  build:
    name: "Formatter and Unit Tests on Ubuntu"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npx prettier --check .
      - run: npm test
